name: Backend CI

on:
  push:
    branches: main
    paths:
      - "backend/**"
      - ".github/workflows/backend_ci.yml"
  pull_request:
    branches: main
    paths:
      - "backend/**"
      - ".github/workflows/backend_ci.yml"
  workflow_dispatch:

jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      # 6.0.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install uv
        # 7.2.0
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b
        with:
          version: "0.9.21"
          enable-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Check code formatting
        run: uvx ruff format --check .

      - name: Check for code errors
        run: uvx ruff check .

  tests:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      # 6.0.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends libcairo2-dev libgirepository-2.0-dev gir1.2-ostree-1.0 gir1.2-appstream-1.0

      - name: Install uv
        # 7.2.0
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b
        with:
          version: "0.9.21"
          enable-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Check types
        run: uv run ty check app

      - name: Run unit tests
        run: uv run pytest -vvvv --ignore=tests/main.py --ignore=tests/test_storefront_smoke.py --ignore=tests/test_year_in_review_smoke.py

  smoketests:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      # 6.0.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # 4.0.0
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build Docker image
        # 7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: backend
          tags: backend_backend
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker backend-node image
        # 7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: backend-node
          tags: backend-node
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Execute smoke tests
        run: |
          docker compose --env-file .env.ci up --no-build -d
          bash tests/run_tests.sh

      - name: Update test snapshots
        if: failure() || cancelled()
        continue-on-error: true
        run: |
          sudo chown -R $(id -u):$(id -g) tests/
          git restore tests/
          git clean -fdX tests/

          docker compose --env-file .env.ci down -v --remove-orphans
          docker volume prune -f

          docker compose --env-file .env.ci up --no-build -d

          bash tests/update_snapshots.sh

      - name: Upload test snapshots
        if: always()
        # 7.0.0
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          if-no-files-found: error
          overwrite: true
          name: snapshots-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            backend/tests/
