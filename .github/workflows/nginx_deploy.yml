name: Build and deploy nginx image

on:
  push:
    branches: main
    paths:
      - "nginx/**"
      - ".github/workflows/nginx_deploy.yml"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    concurrency:
      group: arm64-build_push_docker_nginx
      cancel-in-progress: true
    steps:
      # 6.0.2
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # 4.0.0
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Login to ghcr.io
        # 4.1.0
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        # 7.1.0
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: nginx
          file: nginx/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/arm64
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/nginx:${{ github.sha }}-arm64
            ghcr.io/${{ github.repository_owner }}/nginx:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nginx:arm64-latest
            ghcr.io/${{ github.repository_owner }}/nginx:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=ssh://git@github.com:${{ github.repository }}.git
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
          build-args: |
            SENTRY_RELEASE=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
