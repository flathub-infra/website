name: 🚀 Deploy backend-node

on:
  workflow_run:
    workflows:
      - "Backend node CI"
    branches:
      - main
    types: [completed]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    concurrency:
      group: arm64-build_push_docker_backend_node_prod
      cancel-in-progress: true
    steps:
      # 6.0.2
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # 4.0.0
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Login to ghcr.io
        # 4.1.0
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        # 7.1.0
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: backend-node
          file: backend-node/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          no-cache: true
          platforms: linux/arm64
          provenance: false
          build-args: |
            SENTRY_RELEASE=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/backend-node:${{ github.sha }}-arm64
            ghcr.io/${{ github.repository_owner }}/backend-node:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/backend-node:arm64-latest
            ghcr.io/${{ github.repository_owner }}/backend-node:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=ssh://git@github.com:${{ github.repository }}.git
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Create Sentry release
        # 3.7.0
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: flathub
          SENTRY_PROJECT: backend-node
        with:
          environment: production
          release: ${{ github.sha }}
          set_commits: skip
