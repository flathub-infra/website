name: 🚀 Deploy backend

on:
  workflow_run:
    workflows:
      - 'Backend CI'
    branches:
      - main
    types: [completed]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    concurrency:
      group: arm64-build_push_docker_backend
      cancel-in-progress: true
    steps:
      # 6.0.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # 4.0.0
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to ghcr.io
        # 4.1.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        # 7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/backend:${{ github.sha }}-arm64
            ghcr.io/${{ github.repository_owner }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/backend:arm64-latest
            ghcr.io/${{ github.repository_owner }}/backend:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=ssh://git@github.com:${{ github.repository }}.git
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
          build-args: |
            SENTRY_RELEASE=${{ github.sha }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Sentry release
        # 3.7.0
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: flathub
          SENTRY_PROJECT: backend
        with:
          environment: production
          release: ${{ github.sha }}
          set_commits: skip
