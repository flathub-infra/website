name: Frontend API codegen

on:
  pull_request:
    branches: main
    paths:
      - "backend/**"
      - "frontend/orval.config.ts"
      - "frontend/src/codegen/**"
      - ".github/workflows/frontend_codegen.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codegen-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  codegen:
    # Skip forks: GITHUB_TOKEN is read-only there, so the push would fail.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
        # 6.0.2
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # 4.0.0
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Build Docker image
        # 7.1.0
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: backend
          tags: backend_backend
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker backend-node image
        # 7.1.0
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: backend-node
          tags: backend-node
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start stack
        working-directory: ./backend
        run: docker compose --env-file .env.ci up --no-build -d

      - name: Wait for OpenAPI
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8000/openapi.json && exit 0
            sleep 2
          done
          echo "backend did not become ready"
          docker compose -f backend/docker-compose.yml logs backend
          exit 1

      - name: Set up Node.js
        # 6.4.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"

      - name: Corepack enable
        run: corepack enable pnpm

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Regenerate API client
        working-directory: ./frontend
        run: pnpm exec orval --project flathub-file-transfomer

      - name: Discard non-backend target churn
        run: git checkout -- frontend/src/codegen-pipeline || true

      - name: Verify build
        working-directory: ./frontend
        run: pnpm build

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain frontend/src/codegen)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add frontend/src/codegen
            git commit -m "chore(codegen): regenerate API client from backend OpenAPI"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              BRANCH="chore/codegen-$(date +%Y%m%d-%H%M%S)"
              git checkout -b "$BRANCH"
              git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "$BRANCH"
              gh pr create \
                --title "chore(codegen): regenerate API client from backend OpenAPI" \
                --body "Automated regeneration triggered via workflow dispatch." \
                --base "${{ github.ref_name }}" \
                --head "$BRANCH"
            else
              git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.head_ref }}
            fi
          else
            echo "API client already up to date."
          fi
